<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>张謇时空罗盘 · 通吕运河诗歌数字人文平台</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4FMC9SWY95"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-4FMC9SWY95');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #080808;
      --gold: #C9A84C;
      --gold-dim: rgba(201, 168, 76, 0.25);
      --gold-glow: rgba(201, 168, 76, 0.04);
      --text-primary: #e8e0d0;
      --text-white: #ffffff;
      --text-muted: rgba(232, 224, 208, 0.5);
      --font-serif: 'Noto Serif SC', serif;
      --font-sans: 'Noto Sans SC', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
      font-family: var(--font-sans);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      background-color: var(--bg-primary);
      background-image:
        repeating-linear-gradient(0deg, var(--gold-glow) 0px, var(--gold-glow) 1px, transparent 1px, transparent 50px),
        repeating-linear-gradient(90deg, var(--gold-glow) 0px, var(--gold-glow) 1px, transparent 1px, transparent 50px);
    }

    .splash {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }

    /* Corner gold border */
    .splash::after {
      content: '';
      position: absolute;
      inset: 24px;
      border: 1px solid var(--gold-dim);
      pointer-events: none;
      z-index: 100;
    }

    /* SVG canal decoration */
    .canal-svg {
      position: absolute;
      top: 0;
      right: 0;
      width: 40%;
      height: 100%;
      opacity: 0.7;
      pointer-events: none;
      z-index: 0;
    }

    .splash-content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(2rem, 6vw, 6rem);
      max-width: 1100px;
      padding: 0 clamp(1rem, 4vw, 4rem);
      text-align: center;
    }

    .photo-circle {
      width: clamp(120px, 18vw, 180px);
      height: clamp(120px, 18vw, 180px);
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid var(--gold-dim);
      animation: floatIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .photo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .splash-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    .splash-title {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5.5vw, 5rem);
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.2;
      text-shadow: 0 0 40px rgba(201, 168, 76, 0.15);
    }

    .splash-subtitle {
      font-family: var(--font-sans);
      font-size: clamp(0.85rem, 1.4vw, 1.3rem);
      color: var(--text-primary);
      margin-top: clamp(0.5rem, 1.5vh, 1.2rem);
      letter-spacing: 0.12em;
      font-weight: 300;
    }

    .gold-divider {
      width: 50%;
      max-width: 500px;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 25%, var(--gold) 75%, transparent 100%);
      margin: clamp(0.8rem, 2vh, 1.5rem) auto;
    }

    .splash-cta {
      margin-top: clamp(1.2rem, 3vh, 2rem);
      font-family: var(--font-sans);
      font-size: clamp(0.8rem, 1vw, 1rem);
      color: var(--gold);
      letter-spacing: 0.2em;
      opacity: 0;
      animation: fadeIn 1s ease 1.5s forwards, pulse 2.5s ease-in-out 2.5s infinite;
      border: 1px solid var(--gold-dim);
      padding: clamp(8px, 1.5vh, 14px) clamp(28px, 4vw, 48px);
      border-radius: 2px;
      background: rgba(201, 168, 76, 0.04);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .splash-cta:hover {
      background: rgba(201, 168, 76, 0.12);
      border-color: var(--gold);
      text-shadow: 0 0 16px rgba(201, 168, 76, 0.3);
    }

    .splash-footer {
      position: absolute;
      bottom: clamp(2rem, 4vh, 3.5rem);
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-sans);
      font-size: clamp(0.6rem, 0.8vw, 0.8rem);
      color: var(--text-muted);
      letter-spacing: 0.15em;
      z-index: 2;
      text-align: center;
      animation: fadeUp 0.8s ease 1.8s both;
    }

    .splash-url {
      font-family: var(--font-sans);
      font-size: clamp(0.65rem, 0.8vw, 0.8rem);
      color: var(--gold);
      letter-spacing: 0.2em;
      margin-top: clamp(0.4rem, 1vh, 0.8rem);
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(20px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }

    /* Responsive */
    @media (max-width: 700px) {
      .splash-content {
        flex-direction: column;
        gap: clamp(1rem, 3vh, 2rem);
      }
      .photo-circle {
        width: 120px;
        height: 120px;
      }
      .splash::after { inset: 14px; }
    }

    @media (max-height: 600px) {
      .splash::after { inset: 10px; }
      .photo-circle {
        width: 90px;
        height: 90px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <div class="splash" id="splash" title="点击进入地图">
    <!-- SVG canal decoration -->
    <svg class="canal-svg" viewBox="0 0 600 900" preserveAspectRatio="none">
      <path d="M300,0 C200,250 420,350 250,550 C150,680 380,750 220,900"
            fill="none" stroke="rgba(201,168,76,0.10)" stroke-width="2.5" />
      <path d="M360,0 C480,280 180,380 310,580 C380,680 240,780 330,900"
            fill="none" stroke="rgba(201,168,76,0.07)" stroke-width="3.5" />
      <path d="M240,0 C140,320 400,420 200,620 C80,730 320,800 180,900"
            fill="none" stroke="rgba(201,168,76,0.13)" stroke-width="1.8" />
      <path d="M420,0 C520,220 280,380 420,520 C500,620 300,750 380,900"
            fill="none" stroke="rgba(201,168,76,0.05)" stroke-width="4.5" />
    </svg>

    <div class="splash-content">
      <div class="photo-circle">
        <img src="zhangjian-photo.png" alt="张謇">
      </div>
      <div class="splash-text">
        <h1 class="splash-title">张謇时空罗盘</h1>
        <p class="splash-subtitle">通吕运河 · 诗歌数字人文平台</p>
        <div class="gold-divider"></div>
        <p class="splash-url">loveeti.top</p>
        <div class="splash-cta">点 击 进 入</div>
      </div>
    </div>

    <p class="splash-footer">南通大学 · 数字人文专业</p>
  </div>

  <script>
    (function() {
      var visited = sessionStorage.getItem('splash-seen');
      if (visited) {
        window.location.replace('map.html');
        return;
      }
      sessionStorage.setItem('splash-seen', '1');

      var splash = document.getElementById('splash');
      splash.addEventListener('click', function(e) {
        splash.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        splash.style.opacity = '0';
        splash.style.transform = 'scale(1.03)';
        setTimeout(function() {
          window.location.href = 'map.html';
        }, 500);
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          splash.click();
        }
      });
    })();
  </script>

</body>
</html>
