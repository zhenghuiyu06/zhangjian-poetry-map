<style>
:root {
  --zhu: #A0522D;
  --hong: #6B1A1A;
  --jin: #C5A028;
  --jin-light: rgba(197,160,40,0.15);
  --jin-border: rgba(197,160,40,0.25);
  --mi: #F2EAD8;
  --mi-dim: rgba(242,234,216,0.55);
  --mi-faint: rgba(242,234,216,0.25);
  --panel-bg: #160E06;
  --card-bg: rgba(16,9,4,0.97);
  --panel-w: 288px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'STSong', 'Songti SC', 'Noto Serif SC', 'KaiTi', 'STKaiti', '楷体', '宋体', serif;
  display: flex;
  background: #0D0806;
}

/* ── LEFT PANEL ── */
#panel {
  width: var(--panel-w);
  min-width: var(--panel-w);
  background: var(--panel-bg);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--jin-border);
  z-index: 900;
  position: relative;
  transition: width 0.38s cubic-bezier(0.4,0,0.2,1),
              min-width 0.38s cubic-bezier(0.4,0,0.2,1),
              opacity 0.38s cubic-bezier(0.4,0,0.2,1);
  overflow: visible;
}
#panel.collapsed {
  width: 0;
  min-width: 0;
  border-right: none;
  opacity: 0;
  pointer-events: none;
}

/* ── PANEL TOGGLE BUTTON (child of body, positioned at panel-map seam) ── */
#panel-toggle {
  position: fixed;
  left: calc(var(--panel-w) - 14px);
  top: 50%;
  transform: translateY(-50%);
  width: 28px;
  height: 64px;
  background: rgba(22,14,6,0.92);
  border: 1px solid var(--jin-border);
  border-left: none;
  border-radius: 0 3px 3px 0;
  cursor: pointer;
  z-index: 910;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: left 0.38s cubic-bezier(0.4,0,0.2,1),
              border-color 0.3s,
              background 0.3s;
}
#panel-toggle:hover {
  background: rgba(30,18,8,0.95);
  border-color: var(--jin);
}
#panel-toggle .tog-arrow {
  font-size: 11px;
  color: var(--jin);
  letter-spacing: 0;
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
  user-select: none;
}
/* when panel is collapsed, toggle slides to left edge */
body.panel-folded #panel-toggle {
  left: 8px;
  border-left: 1px solid var(--jin-border);
  border-right: none;
  border-radius: 3px 0 0 3px;
}
body.panel-folded #panel-toggle .tog-arrow {
  transform: scaleX(-1);
}

/* decorative top corner lines */
#panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--jin), transparent);
}

.panel-head {
  padding: 28px 20px 20px;
  text-align: center;
  border-bottom: 1px solid var(--jin-border);
  position: relative;
}

.panel-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--jin);
  letter-spacing: 5px;
  line-height: 1.5;
}

.panel-sub {
  margin-top: 6px;
  font-size: 11px;
  color: var(--mi-faint);
  letter-spacing: 3px;
}

.panel-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 20px 10px;
}
.panel-divider span {
  font-size: 11px;
  color: rgba(197,160,40,0.5);
  letter-spacing: 3px;
  white-space: nowrap;
}
.panel-divider::before,
.panel-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--jin-border);
}

#poem-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 14px 20px;
  scrollbar-width: thin;
  scrollbar-color: rgba(197,160,40,0.2) transparent;
}
#poem-list::-webkit-scrollbar { width: 3px; }
#poem-list::-webkit-scrollbar-thumb { background: rgba(197,160,40,0.2); border-radius: 2px; }

.poem-card {
  border: 1px solid var(--jin-border);
  border-radius: 3px;
  padding: 13px 15px;
  margin-bottom: 9px;
  cursor: pointer;
  transition: background 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
  background: transparent;
}
.poem-card::after {
  content: '';
  position: absolute;
  left: 0; top: 0;
  width: 2px; height: 100%;
  background: var(--hong);
  transform: scaleY(0);
  transform-origin: center;
  transition: transform 0.25s;
}
.poem-card:hover { background: var(--jin-light); border-color: rgba(197,160,40,0.4); }
.poem-card.active { background: var(--jin-light); border-color: rgba(197,160,40,0.5); }
.poem-card:hover::after, .poem-card.active::after { transform: scaleY(1); }

.poem-seq {
  font-size: 10px;
  color: rgba(197,160,40,0.45);
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.poem-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--mi);
  letter-spacing: 3px;
  transition: color 0.2s;
}
.poem-card.active .poem-name { color: var(--jin); }
.poem-place {
  margin-top: 5px;
  font-size: 11px;
  color: var(--mi-faint);
  letter-spacing: 1px;
}
.poem-place::before { content: '▪ '; }

/* fly arrow indicator */
.poem-arrow {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: var(--jin);
  opacity: 0;
  transition: opacity 0.2s;
}
.poem-card:hover .poem-arrow, .poem-card.active .poem-arrow { opacity: 1; }

/* overview card — golden accent */
.poem-card.overview-card {
  border-color: rgba(212,175,55,0.35);
  background: rgba(212,175,55,0.06);
}
.poem-card.overview-card:hover {
  background: rgba(212,175,55,0.14);
  border-color: rgba(212,175,55,0.55);
}
.poem-card.overview-card .poem-name {
  color: #D4AF37;
}
.poem-card.overview-card .poem-seq {
  color: rgba(212,175,55,0.55);
}

.panel-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--jin-border);
  font-size: 10px;
  color: var(--mi-faint);
  text-align: center;
  letter-spacing: 2px;
}

/* ── MAP ── */
#map-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#map {
  position: absolute;
  background: radial-gradient(ellipse at center, #3a2a15 0%, #1a1208 100%);
  top: 0; left: 0; right: 0; bottom: 0;
}

/* Leaflet tile filter for "古地图" feel — light sepia over Gaode tiles */
.leaflet-tile-pane { filter: sepia(0.15) saturate(0.85) brightness(0.95); }
.leaflet-container { background: #2a1a0a !important; }

/* ── DETAIL CARD (slides up from bottom, draggable resize) ── */
#detail {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(20,10,6,0.88);
  backdrop-filter: blur(18px) saturate(1.2);
  -webkit-backdrop-filter: blur(18px) saturate(1.2);
  border-top: 1px solid var(--jin-border);
  z-index: 800;
  transform: translateY(100%);
  transition: transform 0.42s cubic-bezier(0.4,0,0.2,1);
  height: 45%;
  display: flex;
  flex-direction: column;
}
#detail.open { transform: translateY(0); }

/* ── Resize Handle (drag bar at top of detail card) ── */
.resize-handle {
  height: 16px;
  cursor: ns-resize;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  z-index: 10;
  position: relative;
  margin-top: -1px;
}
.resize-handle::after {
  content: '';
  position: absolute;
  left: 16px; right: 16px;
  top: 50%; transform: translateY(-50%);
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(197,160,40,0.2), transparent);
  transition: background 0.2s;
}
.resize-handle:hover,
.resize-handle.dragging {
  background: rgba(197,160,40,0.08);
}
.resize-handle:hover::after,
.resize-handle.dragging::after {
  background: linear-gradient(90deg, transparent, var(--jin), transparent);
}
.resize-grip {
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: center;
}
.resize-grip span {
  display: block;
  width: 24px;
  height: 2px;
  border-radius: 1px;
  background: rgba(197,160,40,0.2);
  transition: all 0.2s;
}
.resize-handle:hover .resize-grip span,
.resize-handle.dragging .resize-grip span {
  background: var(--jin);
  width: 36px;
}

/* top decorative line */
#detail::before {
  content: '';
  display: block;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--jin), var(--hong), transparent);
  flex-shrink: 0;
}

.detail-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px 10px;
  border-bottom: 1px solid var(--jin-border);
  flex-shrink: 0;
}
.detail-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--jin);
  letter-spacing: 3px;
}
.detail-loc {
  font-size: 11px;
  color: var(--mi-dim);
  letter-spacing: 2px;
  margin-top: 3px;
}
.close-btn {
  background: none;
  border: 1px solid var(--jin-border);
  color: var(--mi-dim);
  font-family: inherit;
  font-size: 12px;
  padding: 5px 14px;
  border-radius: 2px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.2s;
}
.close-btn:hover { border-color: var(--jin); color: var(--jin); }

/* ── TABS ── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--jin-border);
  padding: 0 24px;
  flex-shrink: 0;
}
.tab {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--mi-faint);
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 2px;
  padding: 9px 14px;
  cursor: pointer;
  margin-bottom: -1px;
  transition: all 0.2s;
}
.tab:hover { color: var(--mi); }
.tab.on {
  color: #D4AF37;
  border-bottom-color: #D4AF37;
  font-weight: 700;
}

/* ── TAB BODY ── */
.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 18px 24px 20px;
  scrollbar-width: thin;
  scrollbar-color: rgba(197,160,40,0.15) transparent;
}

.pane { display: none; }
.pane.on { display: block; }

.placeholder-box {
  width: 100%;
  height: 160px;
  border: 1px dashed rgba(197,160,40,0.25);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--mi-faint);
  font-size: 12px;
  letter-spacing: 3px;
}

/* video tab */
.video-ratio {
  position: relative;
  padding-bottom: 56.25%;
  background: #000;
  border: 1px solid var(--jin-border);
  border-radius: 2px;
  overflow: hidden;
}
.video-ratio iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}

/* audio tab */
.audio-wrap {
  background: rgba(197,160,40,0.05);
  border: 1px solid var(--jin-border);
  border-radius: 2px;
  padding: 20px;
}
.audio-label {
  font-size: 11px;
  color: rgba(197,160,40,0.5);
  letter-spacing: 3px;
  margin-bottom: 12px;
}
.audio-wrap audio {
  width: 100%;
  accent-color: var(--jin);
}

/* graph tab — ECharts container */
.graph-wrap {
  width: 100%;
  min-height: 300px;
  border: 1px solid var(--jin-border);
  border-radius: 2px;
  background: rgba(10,6,3,0.6);
}
.graph-wrap canvas {
  display: block;
}

/* graph image (pre-made knowledge graph PNG) */
.graph-img-wrap {
  margin-top: 14px;
  border: 1px solid var(--jin-border);
  border-radius: 2px;
  overflow: hidden;
  background: rgba(10,6,3,0.4);
}
.graph-img-wrap img {
  width: 100%;
  display: block;
}
.graph-img-label {
  font-size: 10px;
  color: rgba(197,160,40,0.5);
  letter-spacing: 3px;
  padding: 8px 14px 6px;
  border-bottom: 1px solid rgba(197,160,40,0.12);
}

/* poem lines under graph */
.poem-lines {
  margin-top: 18px;
  padding: 16px 20px;
  border-left: 2px solid var(--hong);
  background: rgba(107,26,26,0.07);
  position: relative;
}
.poem-lines-label {
  font-size: 10px;
  color: rgba(197,160,40,0.45);
  letter-spacing: 3px;
  margin-bottom: 10px;
}
.poem-lines-text {
  font-size: 15px;
  color: #E0D6C8;
  line-height: 2.5;
  letter-spacing: 4px;
}

/* ── CUSTOM LEAFLET MARKER: 垂签 ── */
.mk-tag {
  position: relative;
  width: 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  filter: drop-shadow(0 2px 6px rgba(107,26,26,0.5));
  transition: filter 0.3s;
}
.mk-tag-body {
  width: 36px;
  height: 46px;
  background: var(--hong, #6B1A1A);
  border: 1.5px solid #C5A028;
  border-radius: 4px 4px 0 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.mk-tag-body::before {
  content: '';
  position: absolute;
  inset: 3px;
  border: 1px solid rgba(197,160,40,0.3);
  border-radius: 2px 2px 0 0;
  pointer-events: none;
}
.mk-tag-char {
  font-family: 'Songti SC', 'STKaiti', 'KaiTi', '楷体', serif;
  font-size: 18px;
  font-weight: 700;
  color: #C5A028;
  line-height: 1;
  user-select: none;
}
.mk-tag-tip {
  width: 0; height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 10px solid #C5A028;
  margin-top: -1px;
}
.mk-tag-hole {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(197,160,40,0.6);
  border: 1px solid #C5A028;
  position: absolute;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
}

/* active: glow + pulse ring */
.mk-tag.lit {
  filter: drop-shadow(0 0 10px rgba(197,160,40,0.7)) drop-shadow(0 2px 4px rgba(0,0,0,0.6));
}
.mk-tag.lit .mk-tag-body {
  background: #8B2500;
  border-color: #F2EAD8;
}
.mk-tag.lit .mk-tag-char {
  color: #F2EAD8;
}
.mk-tag.lit .mk-tag-tip {
  border-top-color: #F2EAD8;
}
.mk-tag.lit::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2px solid rgba(197,160,40,0.6);
  animation: pulse-ring 1.6s ease-out infinite;
  pointer-events: none;
}
@keyframes pulse-ring {
  0%   { transform: translate(-50%,-50%) scale(0.7); opacity: 0.8; }
  100% { transform: translate(-50%,-50%) scale(2.2); opacity: 0; }
}
</style>
</head>

/* ═══════ 地图初始化 ═══════ */
let map = null;
try {
  if (typeof L !== 'undefined') {
    map = L.map('map', {
      center: [31.97, 120.89],
      zoom: 11,
      zoomControl: true,
      attributionControl: false
    });
    // 兜底瓦片（OSM 底色，以防高德不加载时全黑）
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18
    }).addTo(map);
    // 高德瓦片（HTTP，webrd 旧版服务器兼容性最好，国内速度优先）
    L.tileLayer('http://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
      maxZoom: 18
    }).addTo(map);
  }
} catch(e) {
  console.warn('地图初始化失败:', e.message);
  map = null;
}

let activeId  = null;

/* ═══════ 自定义标记图标：垂签 ═══════ */
function mkIcon(lit, char) { if (typeof L === 'undefined') return null; 
  return L.divIcon({
    className: '',
    html: `<div class="mk-tag${lit ? ' lit' : ''}">
      <div class="mk-tag-hole"></div>
      <div class="mk-tag-body">
        <span class="mk-tag-char">${char || '詩'}</span>
      </div>
      <div class="mk-tag-tip"></div>
    </div>`,
    iconSize: [36, 60],
    iconAnchor: [18, 56]
  });
}

/* ═══════ 渲染左侧列表 ═══════ */
const list = document.getElementById('poem-list');
POEMS.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'poem-card';
  el.id = 'pc-' + p.id;
  el.innerHTML = `
    <div class="poem-seq">其${HAN[i]}</div>
    <div class="poem-name">${p.title}</div>
    <div class="poem-place">${p.location}</div>
    <span class="poem-arrow">→</span>`;
  el.addEventListener('click', () => flyToPoem(p));
  list.appendChild(el);
});

document.getElementById('pc-0').addEventListener('click', () => {

/* ═══════ 取标记字符：优先使用 emoji 字段 ═══════ */
function getChar(p) {
  return p.emoji || p.title.replace(/[《》]/g, '')[0] || '詩';
}

/* ═══════ 添加地图标记 ═══════ */
if (map) {
  POEMS.forEach(p => {
    const m = L.marker([p.lat, p.lng], { icon: mkIcon(false, getChar(p)) }).addTo(map);
    m.on('click', () => openCard(p));
    markers[p.id] = m;
  });
}

/* ═══════ 点击左侧诗卡：飞行定位 + 自动弹出卡片 ═══════ */
function flyToPoem(p) {
  setActivePoem(p.id);
  updateHash(p.id);
  if (map) { map.flyTo([p.lat, p.lng], 13, { duration: 1.8, easeLinearity: 0.25 }); }
  fillCard(p);
  document.getElementById('detail').classList.add('open');
  switchTab('gph');
}

/* ═══════ 点击地图标记：打开卡片 ═══════ */
function openCard(p) {
  setActivePoem(p.id);
  updateHash(p.id);
  fillCard(p);
  document.getElementById('detail').classList.add('open');
  switchTab('gph');
}

/* ═══════ 设置当前激活诗歌 ═══════ */
function setActivePoem(id) {
  activeId = id;
  document.querySelectorAll('.poem-card').forEach(c => c.classList.remove('active'));
  document.getElementById('pc-' + id)?.classList.add('active');
  POEMS.forEach(p => markers[p.id]?.setIcon(mkIcon(p.id === id, getChar(p))));
}

/* ═══════ Global Graph ═══════ */
function buildGlobalGraphOption() {
  const poemNodes = POEMS.map(p => ({
    name: p.title.replace(/[《》]/g, ''),
    category: 1,
    symbolSize: 30,
    tooltip: {
      formatter: '<span style="color:#D4AF37;font-size:14px;font-weight:bold">' + p.title + '</span><br><span style="color:#E0D6C8;font-size:12px">' + p.location + '</span>'
    }
  }));
  const themeMap = {
    1: '佛寺禅意', 2: '壮阔海天', 3: '托物言志', 4: '沧桑变迁',
    5: '暮色苍凉', 6: '月下哲思', 7: '寒食追思', 8: '雅集忧世'
  };
  const themeNodes = [...new Set(Object.values(themeMap))].map(t => ({
    name: t, category: 3, symbolSize: 28,
    itemStyle: { color: ['#6B9B6A','#E07B39','#8B7BBE','#D64545','#D4AF37','#C5A028','#5B8C5A','#C47B3B'][[...new Set(Object.values(themeMap))].indexOf(t)] || '#6B9B6A' }
  }));

  return {
    backgroundColor: 'transparent',
    animationDuration: 1500,
    animationEasingUpdate: 'quinticInOut',
    tooltip: {
      trigger: 'item',
      formatter: function(p) {
        if (p.dataType === 'edge') return '<span style="color:#D4AF37;font-size:12px;letter-spacing:2px">' + (p.data.label || '') + '</span>';
        return '<span style="color:#D4AF37;font-size:14px;font-weight:bold;letter-spacing:2px">' + p.name + '</span>';
      },
      backgroundColor: 'rgba(20,10,6,0.95)',
      borderColor: 'rgba(212,175,55,0.4)',
      borderWidth: 1,
      textStyle: { color: '#E0D6C8', fontFamily: "'Songti SC','STKaiti','KaiTi','楷体',serif", fontSize: 13 }
    },
    series: [{
      type: 'graph', layout: 'force', roam: true, draggable: true,
      force: { repulsion: 350, edgeLength: [120, 220], gravity: 0.08 },
      emphasis: { focus: 'adjacency', lineStyle: { width: 3 }, itemStyle: { shadowBlur: 20, shadowColor: 'rgba(212,175,55,0.5)' } },
      label: { show: true, position: 'bottom', color: '#E0D6C8', fontSize: 12, fontWeight: 'bold', fontFamily: "'Songti SC','STKaiti','KaiTi','楷体',serif", distance: 6 },
      edgeLabel: { show: true, color: '#E0D6C8', fontSize: 9, fontWeight: 'bold', fontFamily: "'Songti SC','STKaiti','KaiTi','楷体',serif", letterSpacing: 1 },
      edgeSymbol: ['none', 'arrow'], edgeSymbolSize: 6,
      lineStyle: { color: 'rgba(224,214,200,0.4)', width: 1.5, curveness: 0.2 },
      categories: [
        { name: '作者', itemStyle: { color: '#D64545' }, symbol: 'diamond', symbolSize: 52, label: { color: '#D4AF37', fontSize: 16, fontWeight: 700 } },
        { name: '诗作', itemStyle: { color: '#C5A028' }, symbol: 'roundRect', symbolSize: 32 },
        { name: '地点', itemStyle: { color: '#6B9B6A' }, symbol: 'circle', symbolSize: 18 },
        { name: '主题', itemStyle: { color: '#E07B39' }, symbol: 'triangle', symbolSize: 30 }
      ],
      data: [
        { name: '张謇', category: 0, symbolSize: 56 },
        ...poemNodes,
        ...POEMS.map(p => ({ name: p.location, category: 2, symbolSize: 18 })),
        ...themeNodes
      ],
      links: [
        ...POEMS.map(p => ({ source: '张謇', target: p.title.replace(/[《》]/g, ''), label: '诗作' })),
        ...POEMS.map(p => ({ source: p.title.replace(/[《》]/g, ''), target: p.location, label: '地点' })),
        ...POEMS.map((p, i) => ({ source: p.title.replace(/[《》]/g, ''), target: themeMap[i+1] || '佛寺禅意', label: '主题' }))
      ]
    }]
  };
}

/* ═══════ 填充卡片内容 ═══════ */
function fillCard(p) {
  document.getElementById('d-title').textContent = p.title;
  document.getElementById('d-loc').textContent   = p.location;

  // 音频
  const audEl = document.getElementById('d-audio');
  audEl.innerHTML = p.audioUrl
    ? `<audio controls src="${p.audioUrl}"></audio>`
    : `<div class="placeholder-box" style="height:50px;font-size:11px">[ 音频待上传 ]</div>`;

  // 知识图谱 —— ECharts
  if (chartInstance) { chartInstance.dispose(); chartInstance = null; }
  const gphEl = document.getElementById('d-graph');
  gphEl.innerHTML = '';
  if (typeof echarts !== 'undefined') { try { chartInstance = echarts.init(gphEl); chartInstance.setOption(buildGraphOption(p)); } catch(e) { gphEl.innerHTML = '<div class="placeholder-box" style="height:200px">[ 知识图谱加载失败 ]</div>'; } } else { gphEl.innerHTML = '<div class="placeholder-box" style="height:200px">[ ECharts 库未加载 ]</div>'; }

  // 图谱原图（若有预制的知识图谱PNG则展示）
  const imgWrap = document.getElementById('d-graph-img-wrap');
  const imgEl   = document.getElementById('d-graph-img');
  if (p.graphImage) {
    imgWrap.style.display = 'block';
    imgEl.src = p.graphImage;
  } else {
    imgWrap.style.display = 'none';
    imgEl.src = '';
  }

  // 诗句（图谱下方）
  document.getElementById('d-lines-text').innerHTML = p.lines.replace(/\n/g, '<br>');
}

/* ═══════ 标签页切换 ═══════ */
function switchTab(key) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === key));
  document.querySelectorAll('.pane').forEach(pn => pn.classList.remove('on'));
  document.getElementById('pane-' + key)?.classList.add('on');

  // 视频懒加载 / 销毁
  const vidEl = document.getElementById('d-video');
  if (key === 'vid') {
    const p = POEMS.find(x => x.id === activeId);
    if (p && p.videoFile) {
      vidEl.innerHTML = `<video controls style="position:absolute;top:0;left:0;width:100%;height:100%;background:#000"
        src="${p.videoFile}"></video>`;
    } else if (p && p.videoUrl) {
      vidEl.innerHTML = p.videoUrl;
    } else {
      vidEl.innerHTML = `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
           color:rgba(242,234,216,0.25);font-size:12px;letter-spacing:3px">[ 视频待配置 ]</div>`;
    }
  } else {
    vidEl.innerHTML = ''; // 释放资源
  }
  // 切换到知识图谱时重绘图表
  if (key === 'gph' && chartInstance) {
    setTimeout(() => chartInstance.resize(), 50);
  }
}

/* ═══════ 关闭卡片 ═══════ */
document.getElementById('close-btn').addEventListener('click', () => {
  document.getElementById('detail').classList.remove('open');
  document.getElementById('d-video').innerHTML = ''; // 释放视频
  if (chartInstance) { chartInstance.dispose(); chartInstance = null; }
});

/* ═══════ 弹框拖拽缩放 ═══════ */
(function(){
  const detail = document.getElementById('detail');
  const handle = detail.querySelector('.resize-handle');
  const mapWrap = document.getElementById('map-wrap');
  let dragging = false;

  handle.addEventListener('mousedown', function(e) {
    e.preventDefault();
    dragging = true;
    handle.classList.add('dragging');
    detail.style.transition = 'none';
    document.body.style.cursor = 'ns-resize';
    document.body.style.userSelect = 'none';
  });
  handle.addEventListener('touchstart', function(e) {
    dragging = true;
    handle.classList.add('dragging');
    detail.style.transition = 'none';
    document.body.style.userSelect = 'none';
  }, {passive: true});

  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    const r = mapWrap.getBoundingClientRect();
    const y = e.clientY;
    let hPct = ((r.bottom - y) / r.height) * 100;
    hPct = Math.max(16, Math.min(85, hPct));
    detail.style.height = hPct + '%';
  });
  document.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    const r = mapWrap.getBoundingClientRect();
    const y = e.touches[0].clientY;
    let hPct = ((r.bottom - y) / r.height) * 100;
    hPct = Math.max(16, Math.min(85, hPct));
    detail.style.height = hPct + '%';
  }, {passive: true});

  function endDrag() {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    detail.style.transition = 'transform 0.42s cubic-bezier(0.4,0,0.2,1)';
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    // 面板大小变化后重绘图表
    if (chartInstance) { setTimeout(() => chartInstance.resize(), 100); }
  }
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchend', endDrag);
})();

/* ═══════ tab点击事件代理 ═══════ */
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});

/* ═══════ URL Hash 路由 ═══════ */
function updateHash(id) {
  if (id === 0) {
    window.location.hash = 'overview';
  } else {
    window.location.hash = 'poem-' + id;
  }
}

function handleHash() {
  const hash = window.location.hash.replace('#', '');
  if (hash === 'overview') {
    document.getElementById('pc-0')?.click();
  } else if (hash.startsWith('poem-')) {
    const id = parseInt(hash.replace('poem-', ''));
    const p = POEMS.find(x => x.id === id);
    if (p) flyToPoem(p);
  }
}

window.addEventListener('hashchange', handleHash);

// 页面加载时读取 hash
if (window.location.hash) {
  setTimeout(handleHash, 400);
}

/* ═══════ 左侧面板收缩/展开 ═══════ */
const panelToggle = document.getElementById('panel-toggle');
const panel = document.getElementById('panel');
panelToggle.addEventListener('click', () => {
  panel.classList.toggle('collapsed');
  document.body.classList.toggle('panel-folded');
  // 面板展开/收缩后刷新地图尺寸
  if (map) {
    setTimeout(() => map.invalidateSize(), 400);
  }
});
</script>
